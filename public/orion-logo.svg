<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="24" fill="#1e40af"/>
  <rect x="2" y="2" width="116" height="116" rx="22" fill="none" stroke="rgba(96,165,250,0.3)" stroke-width="2"/>
  <!-- Constelação -->
  <circle cx="60" cy="60" r="8" fill="white"/>
  <circle cx="28" cy="30" r="5" fill="rgba(255,255,255,.8)"/>
  <circle cx="92" cy="30" r="5" fill="rgba(255,255,255,.8)"/>
  <circle cx="92" cy="90" r="4.5" fill="rgba(255,255,255,.6)"/>
  <circle cx="28" cy="90" r="3.5" fill="rgba(255,255,255,.45)"/>
  <!-- Linhas da constelação -->
  <line x1="60" y1="60" x2="28" y2="30" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
  <line x1="60" y1="60" x2="92" y2="30" stroke="rgba(255,255,255,.35)" stroke-width="2"/>
  <line x1="60" y1="60" x2="92" y2="90" stroke="rgba(255,255,255,.25)" stroke-width="1.5"/>
  <line x1="28" y1="30" x2="92" y2="30" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
  <!-- Estrela dourada no topo -->
  <polygon points="60,8 63,18 73,18 65,24 68,34 60,28 52,34 55,24 47,18 57,18" fill="#f59e0b" opacity="0.9"/>
</svg>
