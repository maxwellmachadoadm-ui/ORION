<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="120" height="140" rx="20" fill="url(#bg)"/>
  <!-- Linhas da constelação -->
  <line x1="82" y1="18" x2="38" y2="22" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="82" y1="18" x2="85" y2="50" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="38" y1="22" x2="35" y2="50" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="85" y1="50" x2="65" y2="50" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="65" y1="50" x2="55" y2="50" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="50" x2="35" y2="50" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="85" y1="50" x2="90" y2="85" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="50" x2="30" y2="85" stroke="#60a5fa" stroke-width="1" opacity="0.5"/>
  <!-- Betelgeuse (dourada - ombro esquerdo) -->
  <circle cx="38" cy="22" r="5" fill="#f59e0b" opacity="0.95"/>
  <!-- Bellatrix (ombro direito) -->
  <circle cx="82" cy="18" r="4" fill="#e0e7ff" opacity="0.9"/>
  <!-- Cinturão: Alnitak, Alnilam, Mintaka -->
  <circle cx="35" cy="50" r="3" fill="#e0e7ff" opacity="0.85"/>
  <circle cx="55" cy="50" r="3.5" fill="#e0e7ff" opacity="0.9"/>
  <circle cx="65" cy="50" r="3.5" fill="#e0e7ff" opacity="0.9"/>
  <circle cx="85" cy="50" r="3" fill="#e0e7ff" opacity="0.85"/>
  <!-- Rigel (pé direito - brilhante) -->
  <circle cx="90" cy="85" r="4.5" fill="#93c5fd" opacity="0.95"/>
  <!-- Saiph (pé esquerdo) -->
  <circle cx="30" cy="85" r="3.5" fill="#bfdbfe" opacity="0.8"/>
  <!-- Texto ORION -->
  <text x="60" y="115" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="18" fill="white" letter-spacing="4">ORION</text>
</svg>
