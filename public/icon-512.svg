<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="50%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold-border" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow-center" cx="50%" cy="52%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-rigel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#fde68a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="3" y="3" width="506" height="506" rx="93" stroke="url(#gold-border)" stroke-width="4" fill="none" stroke-opacity="0.6"/>
  <rect x="8" y="8" width="496" height="496" rx="90" stroke="rgba(245,158,11,0.1)" stroke-width="1" fill="none"/>
  <!-- Glow -->
  <circle cx="256" cy="270" r="180" fill="url(#glow-center)"/>
  <!-- Constellation lines — gold -->
  <line x1="112" y1="144" x2="368" y2="144" stroke="#f59e0b" stroke-width="6" stroke-opacity="0.5"/>
  <line x1="112" y1="144" x2="160" y2="272" stroke="#f59e0b" stroke-width="5" stroke-opacity="0.4"/>
  <line x1="368" y1="144" x2="352" y2="272" stroke="#f59e0b" stroke-width="5" stroke-opacity="0.4"/>
  <line x1="160" y1="272" x2="256" y2="256" stroke="#fbbf24" stroke-width="7" stroke-opacity="0.7"/>
  <line x1="256" y1="256" x2="352" y2="272" stroke="#fbbf24" stroke-width="7" stroke-opacity="0.7"/>
  <line x1="160" y1="272" x2="160" y2="416" stroke="#f59e0b" stroke-width="5" stroke-opacity="0.38"/>
  <line x1="352" y1="272" x2="384" y2="416" stroke="#f59e0b" stroke-width="5" stroke-opacity="0.38"/>
  <!-- Betelgeuse (top-left, golden giant) -->
  <circle cx="112" cy="144" r="28" fill="#f59e0b" fill-opacity="0.3"/>
  <circle cx="112" cy="144" r="18" fill="#fbbf24"/>
  <circle cx="112" cy="144" r="10" fill="#fde68a"/>
  <!-- Bellatrix (top-right) -->
  <circle cx="368" cy="144" r="20" fill="#f59e0b"/>
  <circle cx="368" cy="144" r="12" fill="#fde68a"/>
  <!-- Belt stars (middle) — gold -->
  <circle cx="160" cy="272" r="17" fill="#fbbf24"/>
  <circle cx="256" cy="256" r="22" fill="#fde68a"/>
  <circle cx="256" cy="256" r="12" fill="#ffffff" fill-opacity="0.8"/>
  <circle cx="352" cy="272" r="17" fill="#fbbf24"/>
  <!-- Rigel (bottom-right, brightest) -->
  <circle cx="384" cy="416" r="40" fill="url(#glow-rigel)" fill-opacity="0.35"/>
  <circle cx="384" cy="416" r="28" fill="#fbbf24" fill-opacity="0.7"/>
  <circle cx="384" cy="416" r="18" fill="#fde68a"/>
  <circle cx="384" cy="416" r="9" fill="#ffffff"/>
  <!-- Saiph (bottom-left) -->
  <circle cx="160" cy="416" r="20" fill="#f59e0b"/>
  <circle cx="160" cy="416" r="10" fill="#fbbf24"/>
  <!-- Background stars scattered — gold tint -->
  <circle cx="48" cy="64" r="3.5" fill="#f59e0b" fill-opacity="0.3"/>
  <circle cx="448" cy="80" r="3.5" fill="#f59e0b" fill-opacity="0.25"/>
  <circle cx="464" cy="320" r="3" fill="#f59e0b" fill-opacity="0.2"/>
  <circle cx="64" cy="448" r="3" fill="#f59e0b" fill-opacity="0.2"/>
  <circle cx="288" cy="48" r="2.5" fill="#fbbf24" fill-opacity="0.18"/>
  <circle cx="480" cy="192" r="2.5" fill="#fbbf24" fill-opacity="0.15"/>
  <circle cx="32" cy="256" r="2" fill="#f59e0b" fill-opacity="0.12"/>
  <circle cx="496" cy="432" r="2" fill="#f59e0b" fill-opacity="0.12"/>
  <circle cx="192" cy="480" r="2" fill="#fbbf24" fill-opacity="0.1"/>
  <!-- ORION text gold -->
  <text x="256" y="496" text-anchor="middle" font-family="'DM Sans', Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="8" fill="rgba(245,158,11,0.35)">ORION</text>
</svg>
